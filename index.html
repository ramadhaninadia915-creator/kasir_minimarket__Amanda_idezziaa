<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kasir Minimarket</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2, h3 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 8px;
        }
        .grid-input {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            margin-bottom: 30px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .pembayaran-section {
            background: #eef2f5;
            padding: 20px;
            border-radius: 6px;
            margin-top: 20px;
            max-width: 400px;
            margin-left: auto;
        }
        .pembayaran-section div {
            margin-bottom: 15px;
        }
        .total-text {
            font-size: 20px;
            font-weight: bold;
            color: #e74c3c;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Aplikasi Kasir Minimarket</h2>
    
    <h3>1. Input Pilihan Barang</h3>
    <div class="grid-input">
        <div>
            <label for="pilihBarang">Pilih Produk :</label>
            <select id="pilihBarang" onchange="updateHargaSatuan()">
                <option value="" data-harga="0">-- Pilih Produk --</option>
                <option value="Susu Kotak 250ml" data-harga="6500">Susu Kotak 250ml (Rp 6.500)</option>
                <option value="Mie Instan Goreng" data-harga="3500">Mie Instan Goreng (Rp 3.500)</option>
                <option value="Air Mineral 600ml" data-harga="4000">Air Mineral 600ml (Rp 4.000)</option>
                <option value="Roti Cokelat" data-harga="8000">Roti Cokelat (Rp 8.000)</option>
            </select>
        </div>
        <div>
            <label for="hargaBarang">Harga Satuan (Rp) :</label>
            <input type="number" id="hargaBarang" readonly value="0">
        </div>
        <div>
            <label for="qtyBarang">Jumlah (Qty) :</label>
            <input type="number" id="qtyBarang" min="1" value="1">
        </div>
        <div>
            <label>&nbsp;</label>
            <button type="button" onclick="tambahKeKeranjang()">Tambah ke Keranjang</button>
        </div>
    </div>

    <h3>2. Daftar Keranjang Belanja</h3>
    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>Nama Barang</th>
                <th>Harga Satuan</th>
                <th>Jumlah (Qty)</th>
                <th>Subtotal</th>
            </tr>
        </thead>
        <tbody id="tabelKeranjang">
            </tbody>
    </table>

    <div class="pembayaran-section">
        <div>
            <label>Total Belanja :</label>
            <span class="total-text" id="totalBelanja">Rp 0</span>
        </div>
        <div>
            <label for="uangBayar">Uang Tunai Pembeli (Rp) :</label>
            <input type="number" id="uangBayar" placeholder="Masukkan nominal..." oninput="hitungKembalian()">
        </div>
        <div>
            <label>Uang Kembalian :</label>
            <span class="total-text" id="uangKembalian" style="color: #27ae60;">Rp 0</span>
        </div>
        <button onclick="prosesTransaksi()">Cetak / Selesai Transaksi</button>
    </div>
</div>

<script>
    let keranjang = [];
    let totalBelanja = 0;

    // Fungsi otomatis mendeteksi harga saat barang dipilih
    function updateHargaSatuan() {
        const select = document.getElementById('pilihBarang');
        const harga = select.options[select.selectedIndex].getAttribute('data-harga');
        document.getElementById('hargaBarang').value = harga;
    }

    // Fungsi memasukkan produk dari inputan ke tabel keranjang
    function tambahKeKeranjang() {
        const select = document.getElementById('pilihBarang');
        const namaBarang = select.value;
        const harga = parseInt(document.getElementById('hargaBarang').value);
        const qty = parseInt(document.getElementById('qtyBarang').value);

        if (!namaBarang || harga === 0) {
            alert("Silakan pilih produk terlebih dahulu!");
            return;
        }

        if (qty < 1 || isNaN(qty)) {
            alert("Jumlah barang minimal 1!");
            return;
        }

        const subtotal = harga * qty;
        
        // Simpan data barang ke dalam array keranjang
        keranjang.push({ namaBarang, harga, qty, subtotal });
        
        // Reset pilihan input kembali ke awal
        select.value = "";
        document.getElementById('hargaBarang').value = 0;
        document.getElementById('qtyBarang').value = 1;
        
        // Tampilkan data terbaru di tabel
        renderTabel();
    }

    // Fungsi menyusun ulang baris tabel HTML berdasarkan isi keranjang
    function renderTabel() {
        const tbody = document.getElementById('tabelKeranjang');
        tbody.innerHTML = ""; 
        totalBelanja = 0;

        keranjang.forEach((item, index) => {
            totalBelanja += item.subtotal;
            
            const row = `<tr>
                <td>${index + 1}</td>
                <td>${item.namaBarang}</td>
                <td>Rp ${item.harga.toLocaleString('id-ID')}</td>
                <td>${item.qty}</td>
                <td>Rp ${item.subtotal.toLocaleString('id-ID')}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        document.getElementById('totalBelanja').innerText = "Rp " + totalBelanja.toLocaleString('id-ID');
        hitungKembalian(); 
    }

    // Fungsi menghitung uang kembalian secara real-time
    function hitungKembalian() {
        const uangBayar = parseInt(document.getElementById('uangBayar').value) || 0;
        const kembalian = uangBayar - totalBelanja;
        
        if (uangBayar === 0) {
            document.getElementById('uangKembalian').innerText = "Rp 0";
        } else if (kembalian >= 0) {
            document.getElementById('uangKembalian').innerText = "Rp " + kembalian.toLocaleString('id-ID');
        } else {
            document.getElementById('uangKembalian').innerText = "Uang Kurang!";
        }
    }

    // Fungsi ketika tombol transaksi ditekan
    function prosesTransaksi() {
        const uangBayar = parseInt(document.getElementById('uangBayar').value) || 0;
        
        if (keranjang.length === 0) {
            alert("Keranjang belanja masih kosong!");
            return;
        }
        if (uangBayar < totalBelanja) {
            alert("Uang pembayaran kurang! Transaksi tidak dapat diproses.");
            return;
        }

        alert("Transaksi Berhasil! Data ini siap disinkronisasikan ke database minimarket_db.");
        
        // Kosongkan kembali seluruh form dan tabel (Reset)
        keranjang = [];
        document.getElementById('uangBayar').value = "";
        renderTabel();
    }
</script>

</body>
</html>
